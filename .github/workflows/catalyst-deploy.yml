name: Deploy to Zoho Catalyst

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate configuration
        run: |
          if grep -q "YOUR_PROJECT_ID\|YOUR_ORG_ID\|YOUR_CLIENT_ID" catalyst.json; then
            echo "::error::catalyst.json still contains placeholder values. Replace YOUR_PROJECT_ID, YOUR_ORG_ID, and YOUR_CLIENT_ID with your actual Catalyst project details before deploying."
            exit 1
          fi
          if [ -z "${{ secrets.CATALYST_TOKEN }}" ]; then
            echo "::error::CATALYST_TOKEN secret is not set. Generate a token with 'catalyst token:generate' and add it as a GitHub Actions secret."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Catalyst CLI
        run: npm install -g zcatalyst-cli

      - name: Deploy to Zoho Catalyst
        env:
          CATALYST_TOKEN: ${{ secrets.CATALYST_TOKEN }}
        run: |
          catalyst deploy --token "$CATALYST_TOKEN"
